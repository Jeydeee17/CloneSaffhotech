<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAFFRONTECH | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="bg-slate-950 text-white flex items-center justify-center min-h-screen p-6">
    <div class="glass-card p-10 rounded-[3rem] w-full max-w-md text-center shadow-2xl">
        <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-600/20">
            <i class="fa-solid fa-shield-halved text-2xl"></i>
        </div>
        <h1 class="text-3xl font-black italic tracking-tighter mb-2 uppercase">Staff Access</h1>
        <p class="text-slate-500 font-bold uppercase text-[9px] tracking-[0.3em] mb-8">Enter security credentials</p>

        <div class="space-y-4">
            <input type="password" id="adminPass" placeholder="••••••••"
                   class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl text-center font-black outline-none focus:border-blue-500 transition-all">
            <button onclick="checkAuth()"
                    class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-2xl font-black uppercase text-xs tracking-widest transition-all active:scale-95">
                Authorize Terminal
            </button>
        </div>
    </div>

    <script>
        function checkAuth() {
            const pass = document.getElementById('adminPass').value;
            // FIXED PASSWORD HERE
            if (pass === "admin123") {
                sessionStorage.setItem('admin_auth', 'true');
                window.location.href = "staff.html"; // Your existing admin dashboard filename
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'ACCESS DENIED',
                    text: 'Invalid security code.',
                    background: '#0f172a',
                    color: '#fff',
                    confirmButtonColor: '#ef4444'
                });
            }
        }
        // Allow "Enter" key to submit
        document.getElementById('adminPass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkAuth();
        });
    </script>
</body>
</html>
