<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>QR Access Control</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red-bg:        #0d0203;
      --red-primary:   #ff1f38;
      --red-glow:      rgba(255, 31, 56, 0.45);
      --red-mid:       #7a0010;
      --green-bg:      #010d03;
      --green-primary: #00e676;
      --green-glow:    rgba(0, 230, 118, 0.45);
      --green-mid:     #005c1f;
      --transition:    0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    /* ─── Root container ───────────────────────────────────────── */
    #app {
      position: relative;
      width: 100vw; height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      background: var(--red-bg);
      transition: background var(--transition);
      padding: 0 0 env(safe-area-inset-bottom, 0);
    }
    #app.unlocked { background: var(--green-bg); }

    /* ─── Animated background grid ─────────────────────────────── */
    #grid-bg {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,31,56,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,31,56,0.06) 1px, transparent 1px);
      background-size: 44px 44px;
      transition: background-image var(--transition);
      pointer-events: none;
      z-index: 0;
    }
    #app.unlocked #grid-bg {
      background-image:
        linear-gradient(rgba(0,230,118,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,230,118,0.06) 1px, transparent 1px);
    }

    /* ─── Header ───────────────────────────────────────────────── */
    #header {
      position: relative; z-index: 2;
      width: 100%;
      padding: 18px 24px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,31,56,0.2);
      transition: border-color var(--transition);
    }
    #app.unlocked #header { border-bottom-color: rgba(0,230,118,0.2); }

    .logo {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--red-primary);
      transition: color var(--transition);
    }
    #app.unlocked .logo { color: var(--green-primary); }

    .status-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--red-primary);
      color: var(--red-primary);
      background: rgba(255,31,56,0.1);
      transition: all var(--transition);
    }
    #app.unlocked .status-badge {
      border-color: var(--green-primary);
      color: var(--green-primary);
      background: rgba(0,230,118,0.1);
    }

    /* ─── Main content ─────────────────────────────────────────── */
    #main {
      position: relative; z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex: 1;
      justify-content: center;
      width: 100%;
      padding: 0 20px;
    }

    /* ─── Lock icon ────────────────────────────────────────────── */
    #lock-wrap {
      position: relative;
      margin-bottom: 28px;
    }

    .lock-ring {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      border: 2px solid var(--red-primary);
      opacity: 0.25;
      animation: pulse-ring 2.4s ease-in-out infinite;
      transition: border-color var(--transition);
    }
    .lock-ring:nth-child(2) {
      inset: -36px;
      animation-delay: 0.8s;
      opacity: 0.12;
    }
    #app.unlocked .lock-ring { border-color: var(--green-primary); }

    #lock-icon {
      width: 88px; height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,31,56,0.12);
      border: 2px solid rgba(255,31,56,0.35);
      transition: all var(--transition);
      box-shadow: 0 0 32px var(--red-glow);
    }
    #app.unlocked #lock-icon {
      background: rgba(0,230,118,0.12);
      border-color: rgba(0,230,118,0.35);
      box-shadow: 0 0 32px var(--green-glow);
      animation: unlock-bounce 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    #lock-svg { transition: all var(--transition); }
    #lock-svg .lock-body { fill: var(--red-primary); transition: fill var(--transition); }
    #lock-svg .lock-shackle { stroke: var(--red-primary); transition: stroke var(--transition); fill: none; stroke-width: 3; stroke-linecap: round; }
    #app.unlocked #lock-svg .lock-body  { fill: var(--green-primary); }
    #app.unlocked #lock-svg .lock-shackle { stroke: var(--green-primary); }

    /* ─── State label ──────────────────────────────────────────── */
    #state-label {
      font-size: clamp(28px, 8vw, 42px);
      font-weight: 800;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--red-primary);
      text-shadow: 0 0 30px var(--red-glow);
      transition: all var(--transition);
      margin-top: 24px;
      margin-bottom: 6px;
    }
    #app.unlocked #state-label {
      color: var(--green-primary);
      text-shadow: 0 0 30px var(--green-glow);
    }

    #state-sub {
      font-size: 12px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 32px;
    }

    /* ─── Camera viewport ──────────────────────────────────────── */
    #scanner-wrap {
      position: relative;
      width: min(300px, 80vw);
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 0 2px rgba(255,31,56,0.3), 0 8px 40px rgba(0,0,0,0.6);
      transition: box-shadow var(--transition);
    }
    #app.unlocked #scanner-wrap {
      box-shadow: 0 0 0 2px rgba(0,230,118,0.3), 0 8px 40px rgba(0,0,0,0.6);
    }

    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    #canvas { display: none; }

    /* Corner brackets */
    .corner {
      position: absolute;
      width: 22px; height: 22px;
      border-color: var(--red-primary);
      border-style: solid;
      transition: border-color var(--transition);
      z-index: 3;
    }
    #app.unlocked .corner { border-color: var(--green-primary); }
    .corner.tl { top: 8px; left: 8px;  border-width: 3px 0 0 3px; }
    .corner.tr { top: 8px; right: 8px; border-width: 3px 3px 0 0; }
    .corner.bl { bottom: 8px; left: 8px;  border-width: 0 0 3px 3px; }
    .corner.br { bottom: 8px; right: 8px; border-width: 0 3px 3px 0; }

    /* Scan line */
    #scan-line {
      position: absolute;
      left: 8px; right: 8px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red-primary), transparent);
      box-shadow: 0 0 8px var(--red-glow);
      z-index: 4;
      animation: scan 2.2s ease-in-out infinite;
      transition: background var(--transition), box-shadow var(--transition);
    }
    #app.unlocked #scan-line {
      background: linear-gradient(90deg, transparent, var(--green-primary), transparent);
      box-shadow: 0 0 8px var(--green-glow);
    }

    /* Camera placeholder text */
    #cam-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      background: rgba(0,0,0,0.75);
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      letter-spacing: 1px;
      text-align: center;
      padding: 20px;
      z-index: 5;
    }
    #cam-placeholder svg { opacity: 0.4; }
    #cam-placeholder.hidden { display: none; }

    /* ─── Message toast ────────────────────────────────────────── */
    #message {
      margin-top: 20px;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      color: rgba(255,255,255,0);
      transition: color 0.3s;
      min-height: 20px;
    }
    #message.denied  { color: var(--red-primary); animation: shake 0.4s ease; }
    #message.granted { color: var(--green-primary); }

    /* ─── Footer ───────────────────────────────────────────────── */
    #footer {
      position: relative; z-index: 2;
      width: 100%;
      padding: 12px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .footer-text {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
    }

    #scan-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.3);
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--red-primary);
      animation: blink 1.2s ease-in-out infinite;
      transition: background var(--transition);
      box-shadow: 0 0 6px var(--red-glow);
    }
    #app.unlocked .dot {
      background: var(--green-primary);
      box-shadow: 0 0 6px var(--green-glow);
    }

    /* ─── Animations ───────────────────────────────────────────── */
    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.25; }
      50%       { transform: scale(1.08); opacity: 0.1; }
    }
    @keyframes scan {
      0%   { top: 10%; }
      50%  { top: 88%; }
      100% { top: 10%; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    @keyframes unlock-bounce {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div id="app">
  <div id="grid-bg"></div>

  <header id="header">
    <span class="logo">SecureEntry</span>
    <span class="status-badge" id="badge">LOCKED</span>
  </header>

  <main id="main">
    <div id="lock-wrap">
      <div class="lock-ring"></div>
      <div class="lock-ring"></div>
      <div id="lock-icon">
        <svg id="lock-svg" width="44" height="44" viewBox="0 0 44 44">
          <path id="shackle-path" class="lock-shackle"
            d="M13 20 V14 C13 8.5 31 8.5 31 14 V20" />
          <rect class="lock-body" x="9" y="20" width="26" height="18" rx="4"/>
          <circle cx="22" cy="29" r="3.5" fill="#000" opacity="0.5"/>
          <rect x="20.5" y="29" width="3" height="5" rx="1.5" fill="#000" opacity="0.5"/>
        </svg>
      </div>
    </div>

    <div id="state-label">LOCKED</div>
    <div id="state-sub">Scan QR code to authenticate</div>

    <div id="scanner-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <div id="scan-line"></div>
      <div id="cam-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
        <span id="cam-status">Tap to enable camera</span>
        <small style="opacity:0.6;font-size:10px">Camera permission required</small>
      </div>
    </div>

    <div id="message"></div>
  </main>

  <footer id="footer">
    <span class="footer-text">QR Access v1.0</span>
    <div id="scan-indicator">
      <div class="dot"></div>
      <span>SCANNING</span>
    </div>
  </footer>
</div>

<script src="codes.js"></script>

<script src="jsQR.js"></script>

<script>
(function() {
  "use strict";

  // ── State ──────────────────────────────────────────────────────────────
  const State = { LOCKED: "locked", UNLOCKED: "unlocked", DENIED: "denied" };
  let currentState = State.LOCKED;
  let isProcessing  = false;
  let resetTimer    = null;
  let scanInterval  = null;
  let stream        = null;

  // ── DOM refs ───────────────────────────────────────────────────────────
  const app          = document.getElementById("app");
  const video        = document.getElementById("video");
  const canvas       = document.getElementById("canvas");
  const ctx          = canvas.getContext("2d", { willReadFrequently: true });
  const stateLabel   = document.getElementById("state-label");
  const stateSub     = document.getElementById("state-sub");
  const badge        = document.getElementById("badge");
  const message      = document.getElementById("message");
  const placeholder  = document.getElementById("cam-placeholder");
  const camStatus    = document.getElementById("cam-status");
  const shackle      = document.getElementById("shackle-path");

  // ── Helper: Normalize strings for perfect matching ─────────────────────
  // This removes trailing slashes, converts to lowercase, and trims spaces
  function normalize(str) {
    if (!str) return "";
    return str.trim()
              .toLowerCase()
              .replace(/\/+$/, ""); // Removes one or more trailing slashes
  }

  // ── Load codes ─────────────────────────────────────────────────────────
  // Create a Set of "Cleaned" codes from your codes.js for fast lookups
  const validSet = new Set(
    (typeof VALID_CODES !== "undefined" ? VALID_CODES : []).map(code => normalize(code))
  );

  // ── UI transitions ─────────────────────────────────────────────────────
  function setUIState(state) {
    currentState = state;
    message.className = "";
    message.textContent = "";

    if (state === State.UNLOCKED) {
      app.classList.add("unlocked");
      stateLabel.textContent = "ACCESS GRANTED";
      badge.textContent = "UNLOCKED";
      stateSub.textContent  = "Welcome! Door is open.";
      shackle.setAttribute("d", "M13 20 V17 C13 11.5 31 11.5 31 17 V20");
      message.textContent   = "✓ CODE ACCEPTED";
      message.className     = "granted";
    } else if (state === State.DENIED) {
      app.classList.remove("unlocked");
      stateLabel.textContent = "ACCESS DENIED";
      badge.textContent = "LOCKED";
      stateSub.textContent  = "Invalid credential.";
      shackle.setAttribute("d", "M13 20 V14 C13 8.5 31 8.5 31 14 V20");
      message.textContent   = "✗ UNAUTHORIZED CODE";
      message.className     = "denied";
    } else {
      app.classList.remove("unlocked");
      stateLabel.textContent = "LOCKED";
      badge.textContent = "LOCKED";
      stateSub.textContent  = "Scan QR code to authenticate";
      shackle.setAttribute("d", "M13 20 V14 C13 8.5 31 8.5 31 14 V20");
    }
  }

  // ── Code validation ────────────────────────────────────────────────────
  function handleCode(rawCode) {
    if (isProcessing) return;
    
    // Normalize the SCANNED code to match the DATABASE format
    const cleanScannedCode = normalize(rawCode);
    
    if (!cleanScannedCode) return; // Ignore empty scans

    isProcessing = true;
    console.log("[QR] Scanned Raw:", rawCode);
    console.log("[QR] Normalized:", cleanScannedCode);

    clearTimeout(resetTimer);

    if (validSet.has(cleanScannedCode)) {
      setUIState(State.UNLOCKED);
      resetTimer = setTimeout(() => {
        setUIState(State.LOCKED);
        isProcessing = false;
      }, 4000);
    } else {
      setUIState(State.DENIED);
      resetTimer = setTimeout(() => {
        setUIState(State.LOCKED);
        isProcessing = false;
      }, 2500);
    }
  }

  // ── QR scanning loop ───────────────────────────────────────────────────
  function scanFrame() {
    if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
    if (isProcessing) return;

    canvas.width  = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

    let result = null;
    if (typeof jsQR === "function") {
      result = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: "dontInvert",
      });
    }

    if (result && result.data) {
      handleCode(result.data);
    }
  }

  // ── Camera init ────────────────────────────────────────────────────────
  async function startCamera() {
    camStatus.textContent = "Starting camera…";
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "environment",
          width:  { ideal: 1280 },
          height: { ideal: 720 },
        },
        audio: false,
      });

      video.srcObject = stream;
      await video.play();
      placeholder.classList.add("hidden");

      scanInterval = setInterval(scanFrame, 200); // ~5fps scan
    } catch (err) {
      console.error("[Camera]", err);
      camStatus.textContent =
        err.name === "NotAllowedError"
          ? "Camera access denied. Please allow camera in browser settings."
          : "Camera unavailable: " + err.message;
    }
  }

  placeholder.addEventListener("click", startCamera);

  if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
    startCamera();
  } else {
    camStatus.textContent = "Camera API not supported in this browser.";
  }

  if ("wakeLock" in navigator) {
    navigator.wakeLock.request("screen").catch(() => {});
  }

})();
</script>
</body>
</html>
